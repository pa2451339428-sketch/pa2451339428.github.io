<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLIN廚房新竹高中訂餐管理</title>
    <!-- 引入 html2canvas 供圖片匯出使用 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background: #EBF1F4; /* 文青灰藍背景 */
            min-height: 100vh;
            padding: 20px;
            color: #334155;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #FFFFFF;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(70, 100, 122, 0.08); /* 帶有藍色調的柔和陰影 */
            overflow: hidden;
        }

        .header {
            background: #46647A; /* 莫蘭迪深灰藍 */
            color: #FFFFFF;
            padding: 35px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            font-weight: 500;
            letter-spacing: 2px;
        }

        .header p {
            font-size: 1.05em;
            opacity: 0.85;
            letter-spacing: 1px;
        }

        .tabs {
            display: flex;
            background: #F8FAFC;
            border-bottom: 1px solid #E2E8F0;
            flex-wrap: wrap;
        }

        .tab {
            flex: 1;
            padding: 20px 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.05em;
            font-weight: 500;
            color: #64748B;
            transition: all 0.3s ease;
            position: relative;
            white-space: nowrap;
            letter-spacing: 1px;
        }

        .tab:hover {
            background: #F1F5F9;
            color: #46647A;
        }

        .tab.active {
            color: #D17B60; /* 鮭魚橘/便當暖橘色 */
            background: white;
            font-weight: 600;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 3px;
            background: #D17B60;
        }

        .tab-content {
            display: none;
            padding: 30px;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #475569;
            letter-spacing: 0.5px;
        }

        input[type="text"], input[type="date"], input[type="number"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #CBD5E1;
            background: #F8FAFC;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
            font-family: inherit;
            color: #334155;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #D17B60;
            background: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(209, 123, 96, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        /* 姓名自動完成建議框樣式 */
        .autocomplete-wrapper {
            position: relative;
        }

        .suggestions-box {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #CBD5E1;
            border-top: none;
            z-index: 99;
            max-height: 200px;
            overflow-y: auto;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: none;
        }

        .suggestion-item {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid #F1F5F9;
            font-size: 1em;
            color: #334155;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover {
            background-color: #F8FAFC;
            color: #D17B60;
        }

        /* 快捷備註按鈕與選項樣式 */
        .quick-notes {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-quick {
            padding: 6px 14px;
            font-size: 0.85em;
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-radius: 20px;
            cursor: pointer;
            color: #64748B;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }

        .btn-quick:hover {
            background: #EBF1F4;
            border-color: #CBD5E1;
            color: #46647A;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 15px;
            background: #F8FAFC;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px dashed #CBD5E1;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
            cursor: pointer;
            font-weight: 500;
            color: #475569;
        }

        /* 付款狀態標籤 */
        .badge-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            border: none;
            color: white;
            transition: opacity 0.2s;
            letter-spacing: 0.5px;
        }
        .badge-status:hover { opacity: 0.85; }
        .status-paid { background-color: #648296; } /* 柔和莫蘭迪藍 */
        .status-unpaid { background-color: #D17B60; } /* 柔和磚橘色 */

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: #D17B60; /* 鮭魚橘 */
            color: white;
        }

        .btn-primary:hover {
            background: #BC6A51;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(209, 123, 96, 0.2);
        }

        .btn-success {
            background: #46647A; /* 莫蘭迪灰藍 */
            color: white;
        }

        .btn-success:hover {
            background: #3A5366;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(70, 100, 122, 0.2);
        }

        .btn-danger {
            background: #C26868; /* 柔和磚紅 */
            color: white;
        }

        .btn-danger:hover {
            background: #A85A5A;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(194, 104, 104, 0.2);
        }

        .btn-warning {
            background: #D6A861; /* 柔和木質黃 */
            color: #FFFFFF;
        }        
        .btn-warning:hover {
            background: #C49752;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(214, 168, 97, 0.3);
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #E2E8F0;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #E2E8F0;
        }

        th {
            background: #F1F5F9;
            font-weight: 600;
            color: #475569;
            font-size: 0.95em;
            letter-spacing: 1px;
        }

        tr:hover {
            background: #F8FAFC;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        .stat-card:nth-child(1) { background: #7C9AA8; } /* 淺灰藍 */
        .stat-card:nth-child(2) { background: #C88270; } /* 柔和磚橘 */
        .stat-card:nth-child(3) { background: #B2B8A3; } /* 柔和抹茶綠/燕麥 */

        .stat-card h3 {
            font-size: 2.2em;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .stat-card p {
            font-weight: 500;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .close {
            color: #A0A0A0;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close:hover {
            color: #334155;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: #648296;
            color: white;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(100, 130, 150, 0.3);
            display: none;
            animation: slideInRight 0.3s ease;
            z-index: 2000;
            font-weight: 500;
            letter-spacing: 1px;
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        .export-section {
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            padding: 30px;
            margin: 30px 0;
        }

        .export-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .export-header h2 {
            color: #46647A;
            font-size: 1.5em;
            font-weight: 600;
            margin: 0;
            letter-spacing: 1px;
        }

        .export-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .export-list {
            background: white;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #E2E8F0;
        }

        .export-list h3 {
            color: #D17B60;
            margin-bottom: 20px;
            font-size: 1.2em;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .order-summary {
            background: white;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #E2E8F0;
        }

        .order-summary h3 {
            color: #46647A;
            margin-bottom: 20px;
            font-size: 1.2em;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 10px 0;
            border-bottom: 1px dashed #CBD5E1;
            color: #475569;
            font-weight: 500;
        }

        .summary-item:last-child {
            border-bottom: none;
            font-weight: bold;
            font-size: 1.15em;
            color: #D17B60;
            padding-bottom: 0;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #F1F5F9;
            color: #334155;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-count {
            background: #D17B60;
            color: white;
            border-radius: 12px;
            padding: 3px 10px;
            font-size: 0.85em;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .export-table {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 20px;
            padding: 0;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .export-content {
                grid-template-columns: 1fr;
            }
            .export-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            .tabs {
                flex-wrap: wrap;
            }
            .tab {
                flex: 1 1 40%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>HOLIN廚房新竹高中訂餐管理</h1>
            <p>文青便當・智能訂餐記錄平台</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('ordering')">📝 訂餐總表</button>
            <button class="tab" onclick="showTab('customers')">👥 顧客資料庫</button>
            <button class="tab" onclick="showTab('menu')">🍽️ 菜單資料庫</button>
            <button class="tab" onclick="showTab('import')">📥 批次匯入(試算表)</button>
        </div>

        <!-- 訂餐總表 -->
        <div id="ordering" class="tab-content active">
            <div class="stats">
                <div class="stat-card">
                    <h3 id="todayOrders">0</h3>
                    <p>今日訂單</p>
                </div>
                <div class="stat-card">
                    <h3 id="todayRevenue">0</h3>
                    <p>今日營收</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalCustomers">0</h3>
                    <p>總顧客數</p>
                </div>
            </div>

            <form id="orderForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="orderDate">日期</label>
                        <input type="date" id="orderDate" required>
                    </div>
                    <div class="form-group">
                        <label for="customerClass">班級/單位</label>
                        <input type="text" id="customerClass" placeholder="選擇名字會自動帶入，或手動填寫" required>
                    </div>
                    <div class="form-group autocomplete-wrapper">
                        <label for="customerName">名字</label>
                        <input type="text" id="customerName" placeholder="手動輸入文字搜尋或新增名字" autocomplete="off" required>
                        <!-- 自動完成建議列表 -->
                        <div id="nameSuggestions" class="suggestions-box"></div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="menuItem">餐點</label>
                        <select id="menuItem" required>
                            <option value="">請選擇餐點</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="price">待付金額</label>
                        <input type="number" id="price" placeholder="會自動計算，亦可手動修改" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label for="notes">備註</label>
                        <input type="text" id="notes" placeholder="特殊需求">
                        
                        <!-- 常用備註快捷鍵 -->
                        <div class="quick-notes">
                            <button type="button" class="btn-quick" onclick="addQuickNote('餐具')">🥢 餐具</button>
                            <button type="button" class="btn-quick" onclick="addQuickNote('蛋全熟')">🍳 蛋全熟</button>
                            <button type="button" class="btn-quick" onclick="addQuickNote('不蔥不洋蔥')">🚫 不蔥不洋蔥</button>
                            <button type="button" class="btn-quick" onclick="addQuickNote('加飯')">🍚 加飯</button>
                            <button type="button" class="btn-quick" onclick="addQuickNote('少飯')">🤏 少飯</button>
                            <button type="button" class="btn-quick" onclick="addQuickNote('贈菜')">🥬 贈菜</button>
                            <button type="button" class="btn-quick" onclick="addQuickNote('無糖茶')">🍵 無糖茶</button>
                            <button type="button" class="btn-quick" onclick="addQuickNote('有糖茶')">🧋 有糖茶</button>
                            <button type="button" class="btn-quick" onclick="addQuickNote('雙次')">✌️ 雙次</button>
                        </div>

                        <!-- 進階選項 (付款狀態與包週) -->
                        <div class="checkbox-group">
                            <label><input type="checkbox" id="isPaidToggle"> 💰 新增時設為「已付款」</label>
                            <label><input type="checkbox" id="isWeeklyToggle"> 📅 包週 (產生連續5天訂單)</label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">新增訂單</button>
            </form>

            <div class="table-container">
                <table id="ordersTable">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>班級/單位</th>
                            <th>名字</th>
                            <th>餐點</th>
                            <th>金額</th>
                            <th>付款狀態</th>
                            <th>備註</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <!-- 今日訂單匯出區域 -->
            <div class="export-section">
                <div class="export-header">
                    <h2>📊 今日訂單匯出</h2>
                    <div>
                        <button class="btn btn-success" onclick="refreshExport()">🔄 重新整理</button>
                        <button class="btn btn-warning" onclick="downloadExportImage()">📸 匯出表格圖片</button>
                    </div>
                </div>

                <div class="export-content">
                    <div class="export-list">
                        <h3>🍽️ 今日菜色訂購列表</h3>
                        <div id="todayOrderList"></div>
                    </div>

                    <div class="order-summary">
                        <h3>💰 今日營收結算</h3>
                        <div id="todayRevenueSummary"></div>
                        
                        <!-- 供圖片匯出專用的完整表格格式 -->
                        <div class="export-table" id="exportTable" style="margin-top: 20px; overflow-x: auto; background-color: #fff;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 顧客資料庫 -->
        <div id="customers" class="tab-content">
            <button class="btn btn-success" onclick="showAddCustomerModal()">➕ 新增顧客</button>
            <div class="table-container">
                <table id="customersTable">
                    <thead>
                        <tr>
                            <th>班級/單位</th>
                            <th>名字</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- 菜單資料庫 -->
        <div id="menu" class="tab-content">
            <button class="btn btn-success" onclick="showAddMenuItemModal()">➕ 新增餐點</button>
            <div class="table-container">
                <table id="menuTable">
                    <thead>
                        <tr>
                            <th>餐點名稱</th>
                            <th>預設價格</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- 批次匯入資料庫 -->
        <div id="import" class="tab-content">
            <div class="export-section">
                <h2 style="color: #46647A; margin-bottom: 10px;">📥 從試算表批次匯入</h2>
                <p style="margin-bottom: 25px; color: #64748B; font-size: 0.95em;">
                    請直接從 Google 試算表或 Excel 中「反白並複製」範圍，然後貼上至下方對應的輸入框。<br>
                    系統會自動識別 Tab 分隔符號並匯入資料。
                </p>

                <!-- 訂單匯入區 -->
                <div class="form-group">
                    <label style="color: #D17B60;">📝 訂單資料匯入區 (試算表欄位順序：班級、名字、待付金額、餐點、備註)</label>
                    <p style="font-size: 0.85em; color: #94A3B8; margin-bottom: 5px;">*日期預設為「訂餐總表」選取的日期。若待付金額填寫「已付款」，系統會自動勾選狀態並帶入預設價格。</p>
                    <textarea id="importOrdersInput" rows="5" placeholder="在此貼上訂單試算表內容...&#10;範例：&#10;101&#9;程子衿&#9;120&#9;菲力雞+蛋&#9;少飯&#10;106&#9;吳光晉&#9;已付款&#9;牛小排100g+蛋&#9;"></textarea>
                    <button class="btn btn-primary" style="margin-top: 10px;" onclick="importData('orders')">確認匯入訂單</button>
                </div>

                <hr style="border: 0; border-top: 1px dashed #CBD5E1; margin: 30px 0;">

                <div class="form-group">
                    <label style="color: #46647A;">👥 顧客資料匯入區 (試算表欄位順序：班級/單位、名字)</label>
                    <textarea id="importCustomersInput" rows="5" placeholder="在此貼上試算表內容...&#10;範例：&#10;101&#9;程子衿&#10;106&#9;吳光晉"></textarea>
                    <button class="btn btn-success" style="margin-top: 10px;" onclick="importData('customers')">確認匯入顧客資料</button>
                </div>

                <hr style="border: 0; border-top: 1px dashed #CBD5E1; margin: 30px 0;">

                <div class="form-group">
                    <label style="color: #648296;">🍽️ 餐點資料匯入區 (試算表欄位順序：餐點名稱、價格)</label>
                    <textarea id="importMenuInput" rows="5" placeholder="在此貼上試算表內容...&#10;範例：&#10;菲力雞+蛋&#9;120&#10;牛小排100g+蛋&#9;145"></textarea>
                    <button class="btn btn-warning" style="margin-top: 10px;" onclick="importData('menu')">確認匯入餐點資料</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增顧客模態框 -->
    <div id="customerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('customerModal')">&times;</span>
            <h2 style="color:#46647A; margin-bottom: 20px;">新增顧客</h2>
            <form id="customerForm">
                <div class="form-group">
                    <label for="newCustomerClass">班級/單位</label>
                    <input type="text" id="newCustomerClass" required>
                </div>
                <div class="form-group">
                    <label for="newCustomerName">名字</label>
                    <input type="text" id="newCustomerName" required>
                </div>
                <button type="submit" class="btn btn-success" style="width: 100%;">新增</button>
            </form>
        </div>
    </div>

    <!-- 新增餐點模態框 -->
    <div id="menuItemModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('menuItemModal')">&times;</span>
            <h2 style="color:#46647A; margin-bottom: 20px;">新增餐點</h2>
            <form id="menuItemForm">
                <div class="form-group">
                    <label for="newMenuItemName">餐點名稱</label>
                    <input type="text" id="newMenuItemName" required>
                </div>
                <div class="form-group">
                    <label for="newMenuItemPrice">預設價格</label>
                    <input type="number" id="newMenuItemPrice" required>
                </div>
                <button type="submit" class="btn btn-success" style="width: 100%;">新增</button>
            </form>
        </div>
    </div>

    <!-- 通知 -->
    <div id="notification" class="notification"></div>

    <script>
        // --- 預設資料庫 ---
        let customers = [
            { class: '101', name: '程子衿' },
            { class: '106', name: '吳光晉' },
            { class: '輔導室', name: '徐老師' },
            { class: '輔導室', name: '謝淑娟' }
        ];

        let menuItems = [
            { name: '菲力雞+蛋', price: 120 },
            { name: '牛小排100g+蛋', price: 145 },
            { name: '大里肌豬+蛋', price: 130 }
        ];

        const todayObj = new Date();
        const defaultTodayStr = todayObj.getFullYear() + '-' + 
                                String(todayObj.getMonth() + 1).padStart(2, '0') + '-' + 
                                String(todayObj.getDate()).padStart(2, '0');

        let orders = [
            { date: defaultTodayStr, class: '101', name: '程子衿', item: '菲力雞+蛋', price: 120, notes: '', isPaid: false },
            { date: defaultTodayStr, class: '106', name: '吳光晉', item: '牛小排100g+蛋', price: 145, notes: '', isPaid: true },
            { date: defaultTodayStr, class: '輔導室', name: '徐老師', item: '大里肌豬+蛋', price: 130, notes: '', isPaid: false },
            { date: defaultTodayStr, class: '輔導室', name: '謝淑娟', item: '大里肌豬+蛋', price: 130, notes: '', isPaid: false }
        ];

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('orderDate').valueAsDate = new Date();
            
            loadData();
            updateDropdowns();
            updateTables();
            updateStats();
            refreshExport();
            setupAutocomplete();

            document.getElementById('orderForm').addEventListener('submit', addOrder);
            document.getElementById('customerForm').addEventListener('submit', addCustomer);
            document.getElementById('menuItemForm').addEventListener('submit', addMenuItem);
            document.getElementById('menuItem').addEventListener('change', updatePrice);
        });

        // 標籤切換
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // 快捷備註點擊輸入
        function addQuickNote(text) {
            const notesInput = document.getElementById('notes');
            const cleanText = text.trim(); 
            if (notesInput.value) {
                notesInput.value += `、${cleanText}`;
            } else {
                notesInput.value = cleanText;
            }
        }

        // 載入與儲存資料
        function loadData() {
            const savedCustomers = localStorage.getItem('customers');
            const savedMenuItems = localStorage.getItem('menuItems');
            const savedOrders = localStorage.getItem('orders');

            if (savedCustomers) customers = JSON.parse(savedCustomers);
            if (savedMenuItems) menuItems = JSON.parse(savedMenuItems);
            if (savedOrders) orders = JSON.parse(savedOrders);
        }

        function saveData() {
            localStorage.setItem('customers', JSON.stringify(customers));
            localStorage.setItem('menuItems', JSON.stringify(menuItems));
            localStorage.setItem('orders', JSON.stringify(orders));
        }

        // 姓名模糊搜尋與自動完成綁定
        function setupAutocomplete() {
            const nameInput = document.getElementById('customerName');
            const suggestBox = document.getElementById('nameSuggestions');

            nameInput.addEventListener('input', function() {
                const val = this.value.trim().toLowerCase();
                suggestBox.innerHTML = '';
                
                if (!val) {
                    suggestBox.style.display = 'none';
                    return;
                }

                const matches = customers.filter(c => 
                    c.name.toLowerCase().includes(val) || 
                    c.class.toLowerCase().includes(val)
                );

                if (matches.length > 0) {
                    matches.forEach(m => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        div.innerHTML = `<strong>${m.class}</strong> - ${m.name}`;
                        
                        div.onclick = function() {
                            nameInput.value = m.name;
                            document.getElementById('customerClass').value = m.class;
                            suggestBox.style.display = 'none';
                        };
                        suggestBox.appendChild(div);
                    });
                    suggestBox.style.display = 'block';
                } else {
                    suggestBox.style.display = 'none';
                }
            });

            document.addEventListener('click', function(e) {
                if (e.target !== nameInput && e.target !== suggestBox) {
                    suggestBox.style.display = 'none';
                }
            });
        }

        // 處理批次匯入 (解析 TSV 格式)
        function importData(type) {
            let count = 0;
            
            if (type === 'orders') {
                const text = document.getElementById('importOrdersInput').value;
                if (!text.trim()) return showNotification('請先貼上資料！');

                const lines = text.split('\n');
                const defaultDate = document.getElementById('orderDate').value;

                lines.forEach(line => {
                    const parts = line.split('\t');
                    // 欄位順序：班級(0)、名字(1)、待付金額(2)、餐點(3)、備註(4)
                    if (parts.length >= 4) {
                        const cClass = parts[0].trim();
                        const cName = parts[1].trim();
                        const priceStr = parts[2].trim();
                        const item = parts[3].trim();
                        const notes = parts[4] ? parts[4].trim() : '';

                        let isPaid = false;
                        let price = 0;

                        // 判斷待付金額：如果是「已付款」，自動設定狀態為true並帶入價格
                        if (priceStr === '已付款') {
                            isPaid = true;
                            const foundMenu = menuItems.find(m => m.name === item);
                            price = foundMenu ? foundMenu.price : 0;
                        } else {
                            price = parseInt(priceStr.replace(/[^0-9]/g, ''));
                            if (isNaN(price)) {
                                const foundMenu = menuItems.find(m => m.name === item);
                                price = foundMenu ? foundMenu.price : 0;
                            }
                        }

                        if (cClass && cName && item) {
                            orders.push({ 
                                date: defaultDate, class: cClass, name: cName, item: item, 
                                price: price, notes: notes, isPaid: isPaid 
                            });
                            count++;
                            
                            if (!customers.find(c => c.name === cName && c.class === cClass)) {
                                customers.push({ class: cClass, name: cName });
                            }
                        }
                    }
                });

                if (count > 0) {
                    saveData();
                    updateTables();
                    updateStats();
                    refreshExport();
                    showNotification(`成功匯入 ${count} 筆訂單資料！`);
                    document.getElementById('importOrdersInput').value = '';
                } else {
                    showNotification('沒有匯入任何新資料，請檢查格式。');
                }
            } 
            else if (type === 'customers') {
                const text = document.getElementById('importCustomersInput').value;
                if (!text.trim()) return showNotification('請先貼上資料！');

                const lines = text.split('\n');
                lines.forEach(line => {
                    const parts = line.split('\t');
                    if (parts.length >= 2) {
                        const cClass = parts[0].trim();
                        const cName = parts[1].trim();
                        if (cClass && cName && !customers.find(c => c.name === cName && c.class === cClass)) {
                            customers.push({ class: cClass, name: cName });
                            count++;
                        }
                    }
                });

                if (count > 0) {
                    saveData();
                    updateTables();
                    showNotification(`成功匯入 ${count} 筆顧客資料！`);
                    document.getElementById('importCustomersInput').value = '';
                } else {
                    showNotification('沒有匯入任何新資料，可能資料已存在或格式不符。');
                }
            } 
            else if (type === 'menu') {
                const text = document.getElementById('importMenuInput').value;
                if (!text.trim()) return showNotification('請先貼上資料！');

                const lines = text.split('\n');
                lines.forEach(line => {
                    const parts = line.split('\t');
                    if (parts.length >= 2) {
                        const mName = parts[0].trim();
                        const mPrice = parseInt(parts[1].trim().replace(/[^0-9]/g, ''));
                        if (mName && !isNaN(mPrice) && !menuItems.find(m => m.name === mName)) {
                            menuItems.push({ name: mName, price: mPrice });
                            count++;
                        }
                    }
                });

                if (count > 0) {
                    saveData();
                    updateDropdowns();
                    updateTables();
                    showNotification(`成功匯入 ${count} 筆餐點資料！`);
                    document.getElementById('importMenuInput').value = '';
                } else {
                    showNotification('沒有匯入任何新資料，可能資料已存在或格式不符。');
                }
            }
        }

        // 更新下拉選單
        function updateDropdowns() {
            const menuSelect = document.getElementById('menuItem');
            menuSelect.innerHTML = '<option value="">請選擇餐點</option>';
            menuItems.forEach(item => {
                menuSelect.innerHTML += `<option value="${item.name}">${item.name} - NT$${item.price}</option>`;
            });
        }

        // 更新所有表格
        function updateTables() {
            updateOrdersTable();
            updateCustomersTable();
            updateMenuTable();
        }

        // 切換付款狀態
        function togglePaymentStatus(index) {
            orders[index].isPaid = !orders[index].isPaid;
            saveData();
            updateTables();
            updateStats();
            refreshExport();
        }

        // 更新訂單表格
        function updateOrdersTable() {
            const tbody = document.querySelector('#ordersTable tbody');
            tbody.innerHTML = '';
            
            // 排序：先依照日期排序(新的在前)，再依照班級排序
            const sortedOrders = [...orders].sort((a, b) => {
                if (a.date !== b.date) return new Date(b.date) - new Date(a.date);
                return a.class.localeCompare(b.class);
            });

            // 因為是複製出的陣列來排序，若要抓到原始 index 做操作，需要先找到原始 index
            sortedOrders.forEach((order) => {
                const originalIndex = orders.indexOf(order);
                const isPaidClass = order.isPaid ? 'status-paid' : 'status-unpaid';
                const isPaidText = order.isPaid ? '✔ 已付款' : '❌ 未付款';

                tbody.innerHTML += `
                    <tr>
                        <td>${order.date}</td>
                        <td>${order.class}</td>
                        <td>${order.name}</td>
                        <td>${order.item}</td>
                        <td>NT$${order.price}</td>
                        <td>
                            <button class="badge-status ${isPaidClass}" onclick="togglePaymentStatus(${originalIndex})">
                                ${isPaidText}
                            </button>
                        </td>
                        <td>${order.notes || '-'}</td>
                        <td>
                            <button class="btn btn-danger" style="padding: 6px 12px; font-size: 0.85em;" onclick="deleteOrder(${originalIndex})">刪除</button>
                        </td>
                    </tr>
                `;
            });
        }

        function updateCustomersTable() {
            const tbody = document.querySelector('#customersTable tbody');
            tbody.innerHTML = '';
            customers.forEach((customer, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td>${customer.class}</td>
                        <td>${customer.name}</td>
                        <td><button class="btn btn-danger" onclick="deleteCustomer(${index})">刪除</button></td>
                    </tr>
                `;
            });
        }

        function updateMenuTable() {
            const tbody = document.querySelector('#menuTable tbody');
            tbody.innerHTML = '';
            menuItems.forEach((item, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td>${item.name}</td>
                        <td>NT$${item.price}</td>
                        <td><button class="btn btn-danger" onclick="deleteMenuItem(${index})">刪除</button></td>
                    </tr>
                `;
            });
        }

        // 更新統計數字
        function updateStats() {
            const today = document.getElementById('orderDate').value || new Date().toISOString().split('T')[0];
            const todayOrders = orders.filter(order => order.date === today);

            document.getElementById('todayOrders').textContent = todayOrders.length;
            document.getElementById('todayRevenue').textContent = todayOrders.reduce((sum, order) => sum + order.price, 0);
            document.getElementById('totalCustomers').textContent = customers.length;
        }

        // 選擇餐點自動帶入價格
        function updatePrice() {
            const itemName = document.getElementById('menuItem').value;
            const item = menuItems.find(m => m.name === itemName);
            if (item) {
                document.getElementById('price').value = item.price;
            } else {
                document.getElementById('price').value = '';
            }
        }

        // 表單送出新增
        function addOrder(e) {
            e.preventDefault();
            
            const cName = document.getElementById('customerName').value;
            const cClass = document.getElementById('customerClass').value;
            const baseDate = document.getElementById('orderDate').value;
            const isWeekly = document.getElementById('isWeeklyToggle').checked;
            const isPaid = document.getElementById('isPaidToggle').checked;
            const menuItem = document.getElementById('menuItem').value;
            const price = parseInt(document.getElementById('price').value);
            const notes = document.getElementById('notes').value;
            
            // 包週自動產生5天
            const daysToCreate = isWeekly ? 5 : 1;
            const startDateObj = new Date(baseDate);

            for(let i = 0; i < daysToCreate; i++) {
                // 複製日期並加 i 天
                let d = new Date(startDateObj);
                d.setDate(d.getDate() + i);
                let dateStr = d.getFullYear() + '-' + 
                              String(d.getMonth() + 1).padStart(2, '0') + '-' + 
                              String(d.getDate()).padStart(2, '0');

                let currentNotes = notes;
                if (isWeekly) {
                    currentNotes = currentNotes ? currentNotes + '、包週' : '包週';
                }

                orders.push({
                    date: dateStr,
                    class: cClass,
                    name: cName,
                    item: menuItem,
                    price: price,
                    notes: currentNotes,
                    isPaid: isPaid
                });
            }
            
            // 新顧客自動存檔
            if (!customers.find(c => c.name === cName && c.class === cClass)) {
                customers.push({ class: cClass, name: cName });
            }

            saveData();
            updateTables();
            updateStats();
            refreshExport();

            // 保留設定
            const currentSelectedDate = document.getElementById('orderDate').value;
            document.getElementById('orderForm').reset();
            document.getElementById('orderDate').value = currentSelectedDate;
            
            if (isWeekly) {
                showNotification('✅ 包週訂單已成功新增 (連續5天)');
            } else {
                showNotification('✅ 訂單新增成功！');
            }
        }

        function addCustomer(e) {
            e.preventDefault();
            const customer = {
                class: document.getElementById('newCustomerClass').value,
                name: document.getElementById('newCustomerName').value
            };
            customers.push(customer);
            saveData();
            updateTables();
            updateStats();
            closeModal('customerModal');
            document.getElementById('customerForm').reset();
            showNotification('顧客新增成功！');
        }

        function addMenuItem(e) {
            e.preventDefault();
            const item = {
                name: document.getElementById('newMenuItemName').value,
                price: parseInt(document.getElementById('newMenuItemPrice').value)
            };
            menuItems.push(item);
            saveData();
            updateDropdowns();
            updateTables();
            closeModal('menuItemModal');
            document.getElementById('menuItemForm').reset();
            showNotification('餐點新增成功！');
        }

        // 刪除處理
        function deleteOrder(index) {
            if (confirm('確定要刪除這個訂單嗎？')) {
                orders.splice(index, 1);
                saveData();
                updateTables();
                updateStats();
                refreshExport();
                showNotification('訂單刪除成功！');
            }
        }

        function deleteCustomer(index) {
            if (confirm('確定要刪除這個顧客嗎？')) {
                customers.splice(index, 1);
                saveData();
                updateTables();
                updateStats();
                showNotification('顧客刪除成功！');
            }
        }

        function deleteMenuItem(index) {
            if (confirm('確定要刪除這個餐點嗎？')) {
                menuItems.splice(index, 1);
                saveData();
                updateDropdowns();
                updateTables();
                showNotification('餐點刪除成功！');
            }
        }

        // 模態框操作
        function showAddCustomerModal() { document.getElementById('customerModal').style.display = 'block'; }
        function showAddMenuItemModal() { document.getElementById('menuItemModal').style.display = 'block'; }
        function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }

        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.style.display = 'block';
            setTimeout(() => { notification.style.display = 'none'; }, 3000);
        }

        // 匯出當日訂單區塊更新
        function refreshExport() {
            const currentSelectedDate = document.getElementById('orderDate').value;
            const todayOrders = orders.filter(order => order.date === currentSelectedDate);

            // 統計菜色
            const menuCount = {};
            todayOrders.forEach(order => {
                if (menuCount[order.item]) {
                    menuCount[order.item]++;
                } else {
                    menuCount[order.item] = 1;
                }
            });

            const orderListDiv = document.getElementById('todayOrderList');
            if (Object.keys(menuCount).length === 0) {
                orderListDiv.innerHTML = '<p style="color: #64748B; text-align: center;">選取日期尚無訂單</p>';
            } else {
                let listHTML = '';
                for (const [item, count] of Object.entries(menuCount)) {
                    const itemPrice = menuItems.find(m => m.name === item)?.price || 0;
                    listHTML += `
                        <div class="order-item">
                            <span>${item}</span>
                            <div>
                                <span class="order-count">${count} 份</span>
                                <span style="margin-left: 10px; color: #46647A; font-weight: bold;">NT$${itemPrice * count}</span>
                            </div>
                        </div>
                    `;
                }
                orderListDiv.innerHTML = listHTML;
            }

            const totalRevenue = todayOrders.reduce((sum, order) => sum + order.price, 0);
            const totalPaid = todayOrders.filter(o => o.isPaid).reduce((sum, order) => sum + order.price, 0);
            const totalUnpaid = todayOrders.filter(o => !o.isPaid).reduce((sum, order) => sum + order.price, 0);
            const totalOrders = todayOrders.length;

            document.getElementById('todayRevenueSummary').innerHTML = `
                <div class="summary-item">
                    <span>總訂單數</span>
                    <span>${totalOrders} 份</span>
                </div>
                <div class="summary-item">
                    <span>總營收金額</span>
                    <span>NT$${totalRevenue}</span>
                </div>
                <div class="summary-item" style="color: #648296; border-bottom: none;">
                    <span>已付款總計</span>
                    <span>NT$${totalPaid}</span>
                </div>
                <div class="summary-item" style="color: #D17B60;">
                    <span>未付款總計</span>
                    <span>NT$${totalUnpaid}</span>
                </div>
            `;

            generateExportTable(todayOrders, totalRevenue, totalPaid, totalUnpaid, currentSelectedDate);
        }

        // 中間名字遮蔽演算法
        function maskName(name) {
            if (!name || name.length <= 1) return name;
            if (name.length === 2) return name[0] + '○';
            return name[0] + '○' + name.substring(2);
        }

        // 產生給圖片匯出用的報表 (文青排版)
        function generateExportTable(todayOrders, totalRevenue, totalPaid, totalUnpaid, dateString) {
            if(todayOrders.length === 0) {
                document.getElementById('exportTable').innerHTML = '<p style="text-align: center; color: #64748B; padding: 20px;">尚無資料可產出報表</p>';
                return;
            }

            const dateObj = new Date(dateString);
            const m = dateObj.getMonth() + 1;
            const d = dateObj.getDate();
            const dateTitle = `${m}/${d} 訂餐報表`;

            let tableHTML = `
                <table style="border-collapse: collapse; width: 100%; min-width: 600px; font-family: 'Microsoft JhengHei', sans-serif; font-size: 11pt; border: 2px solid #46647A; background: white;">
                    <thead>
                        <tr>
                            <th colspan="5" style="background-color: #46647A; border: 1px solid #46647A; padding: 12px; font-size: 14pt; font-weight: 500; text-align: center; color: #FFF; letter-spacing: 2px;">
                                ${dateTitle}
                            </th>
                        </tr>
                        <tr>
                            <th style="background-color: #EBF1F4; border: 1px solid #CBD5E1; padding: 8px; text-align: center; color: #334155; width: 10%;">班級</th>
                            <th style="background-color: #EBF1F4; border: 1px solid #CBD5E1; padding: 8px; text-align: left; color: #334155; width: 20%;">名字</th>
                            <th style="background-color: #EBF1F4; border: 1px solid #CBD5E1; padding: 8px; text-align: center; color: #334155; width: 15%;">付款狀態</th>
                            <th style="background-color: #EBF1F4; border: 1px solid #CBD5E1; padding: 8px; text-align: left; color: #334155; width: 35%;">餐點</th>
                            <th style="background-color: #EBF1F4; border: 1px solid #CBD5E1; padding: 8px; text-align: left; color: #334155; width: 20%;">備註</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            // 照班級排序
            const groupedOrders = {};
            todayOrders.forEach(order => {
                if (!groupedOrders[order.class]) groupedOrders[order.class] = [];
                groupedOrders[order.class].push(order);
            });

            const sortedClasses = Object.keys(groupedOrders).sort((a, b) => {
                const aIsNum = /^\d+$/.test(a);
                const bIsNum = /^\d+$/.test(b);
                if (aIsNum && bIsNum) return parseInt(a) - parseInt(b);
                if (aIsNum) return -1;
                if (bIsNum) return 1;
                return a.localeCompare(b);
            });

            let sortedOrders = [];
            sortedClasses.forEach(className => {
                groupedOrders[className].forEach(order => {
                    sortedOrders.push(order);
                });
            });

            sortedOrders.forEach((order) => {
                const maskedName = maskName(order.name);
                let mealText = order.item;
                
                // 狀態與金額顯示邏輯：已付款只顯示「已付」(低調藍)，未付款直接顯示「$金額」(醒目橘紅)
                const statusHtml = order.isPaid 
                    ? '<span style="color: #648296; font-weight: 600;">已付</span>' 
                    : `<span style="color: #D17B60; font-weight: bold; font-size: 1.1em;">$${order.price}</span>`;

                tableHTML += `
                    <tr>
                        <td style="border: 1px solid #E2E8F0; padding: 8px; text-align: center; color: #334155;">${order.class}</td>
                        <td style="border: 1px solid #E2E8F0; padding: 8px; text-align: left; color: #334155; font-weight: 500;">${maskedName}</td>
                        <td style="border: 1px solid #E2E8F0; padding: 8px; text-align: center;">${statusHtml}</td>
                        <td style="border: 1px solid #E2E8F0; padding: 8px; text-align: left; color: #334155;">${mealText}</td>
                        <td style="border: 1px solid #E2E8F0; padding: 8px; text-align: left; color: #64748B;">${order.notes || ''}</td>
                    </tr>
                `;
            });

            tableHTML += `
                    <tr>
                        <td style="background-color: #F8FAFC; border: 1px solid #E2E8F0; padding: 10px 8px; text-align: center; font-weight: 600; color: #334155;" colspan="2">總計金額</td>
                        <td style="background-color: #F8FAFC; border: 1px solid #E2E8F0; padding: 10px 8px; text-align: center; font-weight: bold; color: #334155; font-size: 1.1em;">$${totalRevenue}</td>
                        <td style="background-color: #F8FAFC; border: 1px solid #E2E8F0; padding: 10px 8px; text-align: center; font-weight: 600; color: #334155;" colspan="2">共 ${todayOrders.length} 份</td>
                    </tr>
                    <tr>
                        <td style="background-color: #F8FAFC; border: 1px solid #E2E8F0; padding: 8px; text-align: center; font-weight: 600; color: #648296;" colspan="2">已付款總計</td>
                        <td style="background-color: #F8FAFC; border: 1px solid #E2E8F0; padding: 8px; text-align: center; font-weight: bold; color: #648296;">$${totalPaid}</td>
                        <td style="background-color: #F8FAFC; border: 1px solid #E2E8F0; padding: 8px; text-align: center;" colspan="2"></td>
                    </tr>
                    <tr>
                        <td style="background-color: #F8FAFC; border: 1px solid #E2E8F0; padding: 8px; text-align: center; font-weight: 600; color: #D17B60;" colspan="2">未付款總計</td>
                        <td style="background-color: #F8FAFC; border: 1px solid #E2E8F0; padding: 8px; text-align: center; font-weight: bold; color: #D17B60;">$${totalUnpaid}</td>
                        <td style="background-color: #F8FAFC; border: 1px solid #E2E8F0; padding: 8px; text-align: center;" colspan="2"></td>
                    </tr>
                </tbody>
            </table>
            `;

            document.getElementById('exportTable').innerHTML = tableHTML;
        }

        // 將表格匯出為圖片下載
        function downloadExportImage() {
            const tableElement = document.querySelector('#exportTable table');
            if (!tableElement) {
                showNotification('沒有表格資料可匯出圖片！');
                return;
            }

            // 確保圖片渲染清晰，增加 scale
            html2canvas(document.getElementById('exportTable'), {
                scale: 2, 
                backgroundColor: "#ffffff"
            }).then(canvas => {
                const dateStr = document.getElementById('orderDate').value;
                const link = document.createElement('a');
                link.download = `訂餐報表_${dateStr}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                showNotification('✅ 表格圖片已成功下載！');
            }).catch(err => {
                showNotification('❌ 圖片匯出失敗，請稍後再試。');
                console.error(err);
            });
        }
    </script>
</body>
</html>
